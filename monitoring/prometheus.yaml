apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "redis-exporter"
        static_configs:
          - targets: ["redis:9121"]

      - job_name: "dcgm-exporter"
        static_configs:
          - targets: ["dcgm-exporter:9400"]

      - job_name: "vllm"
        static_configs:
          - targets: ["vllm:8000"]

      - job_name: "kube-state-metrics"
        static_configs:
          - targets: ["kube-state-metrics.kube-system:8080"]

      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["pods", "nodes", "endpoints", "services"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: llm-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=1d"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  llm-gateway.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "links": [],
      "panels": [
        {
          "title": "Queue Depth",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "redis_key_size{key=\"inference_queue\"}",
              "legendFormat": "inference_queue",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 20 },
              "unit": "short"
            }
          }
        },
        {
          "title": "Worker Pod Count",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 6, "y": 0 },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas{deployment=\"worker\"}",
              "legendFormat": "worker replicas",
              "refId": "A"
            },
            {
              "expr": "kube_deployment_status_replicas{deployment=\"vllm\"}",
              "legendFormat": "vllm replicas",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "short"
            }
          }
        },
        {
          "title": "Node Count",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "count(kube_node_info)",
              "legendFormat": "total nodes",
              "refId": "A"
            },
            {
              "expr": "count(kube_node_status_capacity{resource=\"nvidia_com_gpu\"} > 0)",
              "legendFormat": "GPU nodes",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "short",
              "decimals": 0
            }
          }
        },
        {
          "title": "GPU Utilization",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 18, "y": 0 },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_GPU_UTIL",
              "legendFormat": "{{gpu}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "percent"
            }
          }
        },
        {
          "title": "vLLM Running Requests",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 0, "y": 7 },
          "targets": [
            {
              "expr": "vllm:num_requests_running",
              "legendFormat": "running",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "short"
            }
          }
        },
        {
          "title": "vLLM Waiting Requests",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 6, "y": 7 },
          "targets": [
            {
              "expr": "vllm:num_requests_waiting",
              "legendFormat": "waiting",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "unit": "short"
            }
          }
        },
        {
          "title": "KV Cache Usage",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 12, "y": 7 },
          "targets": [
            {
              "expr": "vllm:gpu_cache_usage_perc",
              "legendFormat": "KV cache %",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "percentunit",
              "max": 1
            }
          }
        },
        {
          "title": "GPU Power Draw",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 18, "y": 7 },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_POWER_USAGE",
              "legendFormat": "{{gpu}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "watt"
            }
          }
        },
        {
          "title": "Tokens/sec",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 0, "y": 14 },
          "targets": [
            {
              "expr": "rate(vllm:generation_tokens_total[1m])",
              "legendFormat": "tokens/sec",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "short"
            }
          }
        },
        {
          "title": "Request Latency (p50 / p95)",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 6, "y": 14 },
          "targets": [
            {
              "expr": "histogram_quantile(0.5, rate(http_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))",
              "legendFormat": "p95",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "s"
            }
          }
        },
        {
          "title": "TTFT - Time to First Token",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 12, "y": 14 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, rate(vllm:time_to_first_token_seconds_bucket[5m]))",
              "legendFormat": "p95 TTFT",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "s"
            }
          }
        },
        {
          "title": "GPU Memory Used",
          "type": "timeseries",
          "gridPos": { "h": 7, "w": 6, "x": 18, "y": 14 },
          "targets": [
            {
              "expr": "DCGM_FI_DEV_FB_USED",
              "legendFormat": "{{gpu}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "unit": "decmbytes"
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["llm", "inference", "gpu"],
      "templating": { "list": [] },
      "time": { "from": "now-30m", "to": "now" },
      "title": "LLM Gateway",
      "uid": "llm-gateway"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
            - name: GF_RENDERING_SERVER_URL
              value: "http://localhost:8081/render"
            - name: GF_RENDERING_CALLBACK_URL
              value: "http://localhost:3000/"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provisioning
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
        - name: renderer
          image: grafana/grafana-image-renderer:latest
          ports:
            - containerPort: 8081
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provisioning
          configMap:
            name: grafana-dashboard-provisioning
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
